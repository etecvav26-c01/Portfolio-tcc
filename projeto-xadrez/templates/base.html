    <!DOCTYPE html>
    <html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>ChessMaster</title>
        <link rel="stylesheet"
            href="{{url_for('static', filename='css/style.css')}}">

        <link rel="stylesheet"
            href="{{ url_for('static', filename='css/bootstrap.min.css') }}">

        <link rel="stylesheet"
        href="{{ url_for('static', filename='css/chessboard-1.0.0.min.css') }}">
</head>
    <body>

        <nav class="navbar bg-body-tertiary fixed-top">
            <div class="container-fluid">

                <a class="navbar-brand" href="#">
                    Primeiro Lance
                </a>

                <button class="navbar-toggler"
                        type="button"
                        data-bs-toggle="offcanvas"
                        data-bs-target="#navbarPrincipal"
                        aria-controls="navbarPrincipal">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <div class="offcanvas offcanvas-end"
                    tabindex="-1"
                    id="navbarPrincipal">

                    <div class="offcanvas-header">

                        <h5 class="offcanvas-title">
                            Primeiro Lance
                        </h5>

                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="offcanvas">
                        </button>

                    </div>

                    <div class="offcanvas-body">

                        <ul class="navbar-nav">

                            <li class="nav-item">
                                <a class="nav-link" href="/">
                                    Home
                                </a>
                            </li>

                            <li class="nav-item">
                                <a class="nav-link" href="/aprender">
                                    Aprender
                                </a>
                            </li>

                            <li class="nav-item">
                                <a class="nav-link" href="/exercicios">
                                    Exercícios
                                </a>
                            </li>

                        </ul>

                    </div>

                </div>

            </div>
        </nav>

        <div class="container" style="padding-top: 90px;">
            {% block content %}
            {% endblock %}

        </div>

        <!-- scripts-->
    <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>

    <script src="{{ url_for('static', filename='js/chessboard-1.0.0.min.js') }}"></script>
        
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>


    <script src="{{ url_for('static', filename='js/sweetalert2.min.js') }}"></script>

    <script src="{{ url_for('static', filename='js/chart.umd.min.js') }}"></script>

    </body>

</html>

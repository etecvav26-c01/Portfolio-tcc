<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ChessMaster</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/bootstrap/bootstrap.min.css') }}">

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/chessboard.min.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/">
                ChessMaster
            </a>

            <div class="navbar-nav">
                <a class="nav-link" href="/">Início</a>
                <a class="nav-link" href="/aprender">Aprender</a>
                <a class="nav-link" href="/exercicios">Exercícios</a>
                <a class="nav-link" href="/perfil">Perfil</a>
            </div>

        </div>

    </nav>

    <div class="container mt-4">

        {% block content %}
        {% endblock %}

    </div>

    <!-- scripts-->

    <script src="{{ url_for('static', filename='js/bootstrap/bootstrap.bundle.min.js') }}"></script>

    <script src="{{ url_for('static', filename='js/chessboard.min.js') }}"></script>

    <script src="{{ url_for('static', filename='js/chess.js') }}"></script>

    <script src="{{ url_for('static', filename='js/sweetalert2.min.js') }}"></script>

    <script src="{{ url_for('static', filename='js/chart.umd.min.js') }}"></script>

</body>

</html>

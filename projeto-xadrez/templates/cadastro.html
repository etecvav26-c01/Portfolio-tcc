{% extends "base.html" %}

{% block content %}

<h1>Criar Conta</h1>

<form method="POST">

    <div class="mb-3">
        <label>Nome</label>
        <input type="text"
               name="nome"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email"
               name="email"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Senha</label>
        <input type="password"
               name="senha"
               class="form-control"
               required>
    </div>

    <button class="btn btn-primary">
        Criar Conta
    </button>

</form>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card mt-4">

        <div class="card-body">

            <h2 class="text-warning">
                Teste do Motor - Primeiro Lance Engine
            </h2>

            <p class="text-secondary">
                Esta página serve para testar o funcionamento do tabuleiro.
            </p>

        </div>

    </div>

    <br>

    <div class="row">

        <div class="col-lg-8">

            <div id="board" style="max-width:600px;"></div>

        </div>

        <div class="col-lg-4">

            <div class="card mb-3">

                <div class="card-body">

                    <h5>Controles</h5>

                    <button class="btn btn-warning w-100 mb-2"
                            onclick="PLBoard.reset()">

                        Reiniciar Partida

                    </button>

                    <button class="btn btn-secondary w-100 mb-2"
                            onclick="PLBoard.flip()">

                        Girar Tabuleiro

                    </button>

                    <button class="btn btn-info w-100"
                            onclick="mostrarFen()">

                        Mostrar FEN

                    </button>

                </div>

            </div>

            <div class="card">

                <div class="card-body">

                    <h5>Informações</h5>

                    <p><strong>FEN Atual</strong></p>

                    <textarea
                        id="fen"
                        class="form-control"
                        rows="7"
                        readonly></textarea>

                </div>

            </div>

        </div>

    </div>

</div>

<script type="module"
src="{{ url_for('static', filename='js/main.js') }}">
</script>

<script>

    function mostrarFen(){

        document.getElementById("fen").value =
            PLBoard.fen();

    }

    setInterval(mostrarFen,500);

</script>

{% endblock %}

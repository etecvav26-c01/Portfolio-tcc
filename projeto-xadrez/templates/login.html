{% extends "base.html" %}

{% block content %}
{% with messages = get_flashed_messages() %}
    {% if messages %}

        <div class="alert alert-success">

            {% for message in messages %}
                {{ message }}
            {% endfor %}

        </div>

    {% endif %}
{% endwith %}
<br>
<br>

    <center><h1>Login</h1></center>

    <form method="POST">    

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                name="email"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Senha</label>
            <input type="password"
                name="senha"
                class="form-control"
                required>
        </div>
        <br>
        <center><button class="btn btn-primary">
            Entrar
        </button></center>

    </form>
    <br>
    <p class="text-center">
        Não possui uma conta?
        <a href="/cadastro">
            Cadastre-se aqui
        </a>
    </p>
 





{% endblock %}
